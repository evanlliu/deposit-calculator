<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>定存计算器</title>
  <!-- iOS / PWA：添加到主屏幕后以独立 App 方式打开，不显示 Safari 地址栏 -->
  <meta name="theme-color" content="#2563eb" />
  <meta name="application-name" content="定存计算器" />
  <meta name="apple-mobile-web-app-title" content="定存计算器" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32%), linear-gradient(135deg, #f4f7fb 0%, #e9eef7 100%);
      color: #1f2937;
      min-height: 100vh;
      min-height: 100dvh;
      padding: calc(12px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: none;
    }

    .standalone-mode body {
      min-height: 100dvh;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(24px, 2.8vw, 34px);
      line-height: 1.16;
      color: #0f172a;
      letter-spacing: -0.04em;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .calculator-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 308px;
      gap: 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 22px;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
      padding: 16px;
      backdrop-filter: blur(12px);
    }

    .card-main,
    .card-side {
      min-width: 0;
    }

    .card-side {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mode-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .mode-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
      padding: 8px 13px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 750;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .mode-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 15px;
      padding: 11px;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: #27364a;
      margin-bottom: 7px;
      font-weight: 750;
    }

    .field .hint {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .date-range {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .date-field {
      min-width: 0;
    }

    .date-field span {
      display: block;
      margin-bottom: 4px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
    }

    .date-field input {
      height: 36px;
      font-size: 13px;
      padding: 0 9px;
    }

    .date-note {
      margin-top: 7px;
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.45;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      padding: 0 11px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    select {
      max-width: 104px;
      flex-shrink: 0;
    }

    .disabled-input {
      background: #eef2ff;
      border-color: #93c5fd;
      color: #1d4ed8;
      font-weight: 750;
    }

    .base-days {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 15px;
      color: #475569;
      font-size: 13px;
      line-height: 1.45;
    }

    .base-days select {
      max-width: 150px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 750;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary-btn {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
      flex: 1;
      min-width: 180px;
    }

    .secondary-btn {
      background: #eef2ff;
      color: #1d4ed8;
      min-width: 110px;
    }

    .result {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .result-item {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      border-radius: 17px;
      padding: 13px 14px;
      min-height: 78px;
    }

    .result-item span {
      display: block;
      color: #cbd5e1;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .result-item strong {
      display: block;
      font-size: 21px;
      line-height: 1.15;
      word-break: break-word;
    }

    .formula {
      color: #64748b;
      font-size: 12px;
      line-height: 1.65;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 15px;
      padding: 11px 12px;
    }

    .message {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 13px;
      display: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .example-box {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .example-btn {
      background: #f1f5f9;
      color: #334155;
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 999px;
      font-weight: 700;
      line-height: 1.2;
    }

    .float-lang {
      position: fixed;
      right: calc(18px + env(safe-area-inset-right));
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 20;
      min-width: 54px;
      height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      background: #0f172a;
      color: #fff;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 14px;
    }

    @media (min-width: 721px) and (max-height: 760px) {
      body {
        padding-top: calc(8px + env(safe-area-inset-top));
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }

      .header {
        margin-bottom: 8px;
      }

      .header h1 {
        font-size: 26px;
      }

      .calculator-card {
        padding: 14px;
        gap: 12px;
      }

      .field {
        padding: 10px;
      }

      .result-item {
        min-height: 70px;
        padding: 11px 12px;
      }
    }

    @media (max-width: 900px) {
      .calculator-card {
        grid-template-columns: 1fr;
      }

      .card-side {
        display: grid;
        grid-template-columns: 1fr;
      }

      .result {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      body {
        padding: calc(6px + env(safe-area-inset-top)) calc(6px + env(safe-area-inset-right)) calc(56px + env(safe-area-inset-bottom)) calc(6px + env(safe-area-inset-left));
      }

      .header {
        margin-bottom: 5px;
      }

      .title-row {
        gap: 6px;
      }

      .header h1 {
        font-size: 20px;
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      .version-badge {
        height: 18px;
        padding: 0 6px;
        font-size: 10px;
      }

      .calculator-card {
        padding: 7px;
        border-radius: 15px;
        gap: 6px;
      }

      .card-main,
      .card-side {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .mode-box {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
        margin-bottom: 0;
      }

      .mode-btn {
        min-width: 0;
        padding: 6px 3px;
        font-size: 11px;
        line-height: 1.15;
        border-radius: 11px;
        white-space: normal;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .field {
        padding: 6px;
        border-radius: 12px;
      }

      .field label {
        margin-bottom: 4px;
        font-size: 11px;
      }

      .field .hint {
        display: none;
      }

      input,
      select {
        height: 32px;
        border-radius: 10px;
        padding: 0 8px;
        font-size: 14px;
      }

      select {
        max-width: 74px;
        padding: 0 6px;
      }

      .input-row {
        gap: 5px;
      }

      .date-range {
        margin-top: 6px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 5px;
      }

      .date-field span {
        margin-bottom: 2px;
        font-size: 10px;
      }

      .date-field input {
        height: 30px;
        padding: 0 5px;
        font-size: 12px;
      }

      .date-note {
        display: none;
      }

      .base-days {
        margin-top: 0;
        flex-direction: row;
        align-items: center;
        gap: 7px;
        padding: 6px 8px;
        border-radius: 12px;
        font-size: 11px;
        line-height: 1.3;
      }

      .base-days > div {
        flex: 1;
        min-width: 0;
      }

      .base-days select {
        max-width: 92px;
        height: 32px;
        font-size: 12px;
      }

      .actions {
        flex-wrap: nowrap;
        gap: 6px;
        margin-top: 0;
      }

      button {
        padding: 8px 10px;
        border-radius: 11px;
        font-size: 13px;
      }

      .primary-btn {
        min-width: 0;
      }

      .secondary-btn {
        min-width: 74px;
      }

      .message {
        margin-top: 0;
        padding: 7px 8px;
        border-radius: 10px;
        font-size: 11px;
        line-height: 1.35;
      }

      .result {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
      }

      .result-item {
        min-height: 52px;
        padding: 7px 6px;
        border-radius: 12px;
      }

      .result-item span {
        margin-bottom: 4px;
        font-size: 10px;
        white-space: nowrap;
      }

      .result-item strong {
        font-size: 14px;
        line-height: 1.08;
      }

      .formula {
        padding: 6px 8px;
        border-radius: 12px;
        font-size: 10.5px;
        line-height: 1.35;
      }

      .example-box {
        flex-wrap: nowrap;
        gap: 5px;
        overflow-x: auto;
        padding-bottom: 1px;
        scrollbar-width: none;
      }

      .example-box::-webkit-scrollbar {
        display: none;
      }

      .example-btn {
        flex: 0 0 auto;
        max-width: 190px;
        padding: 6px 8px;
        border-radius: 999px;
        font-size: 10.5px;
        white-space: nowrap;
      }

      .float-lang {
        right: calc(10px + env(safe-area-inset-right));
        bottom: calc(10px + env(safe-area-inset-bottom));
        min-width: 46px;
        height: 38px;
        padding: 0 12px;
        font-size: 13px;
      }
    }

    @media (max-width: 390px) {
      .mode-btn {
        font-size: 10px;
        padding-left: 2px;
        padding-right: 2px;
      }

      .date-field input {
        font-size: 11px;
      }

      .result-item strong {
        font-size: 13px;
      }
    }

    @media (max-width: 720px) and (max-height: 700px) {
      .formula {
        display: none;
      }

      .example-box {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title-row">
        <h1 data-i18n="title">定存计算器</h1>
        <span class="version-badge" id="appVersion">v1.4.0</span>
      </div>
    </div>

    <div class="calculator-card">
      <main class="card-main">
        <div class="mode-box">
          <button class="mode-btn active" data-target="rate" data-i18n="mode.rate">求年利率</button>
          <button class="mode-btn" data-target="interest" data-i18n="mode.interest">算利息</button>
          <button class="mode-btn" data-target="principal" data-i18n="mode.principal">求本金</button>
          <button class="mode-btn" data-target="term" data-i18n="mode.term">求期限</button>
        </div>

        <div class="grid">
          <div class="field">
            <label for="principal">
              <span data-i18n="field.principal">本金</span>
              <span class="hint">Principal</span>
            </label>
            <input id="principal" type="number" min="0" step="0.01" data-i18n-placeholder="placeholder.principal" placeholder="例如：100000" />
          </div>

          <div class="field">
            <label for="term">
              <span data-i18n="field.term">存款期限</span>
              <span class="hint">Term</span>
            </label>
            <div class="input-row">
              <input id="term" type="number" min="0" step="0.01" data-i18n-placeholder="placeholder.term" placeholder="例如：35" />
              <select id="termUnit" aria-label="Term unit">
                <option value="day" data-i18n="unit.day">天</option>
                <option value="month" data-i18n="unit.month">月</option>
                <option value="year" data-i18n="unit.year">年</option>
              </select>
            </div>
            <div class="date-range" aria-label="根据开始日期和结束日期自动计算存款天数">
              <div class="date-field">
                <span data-i18n="date.start">开始日期</span>
                <input id="startDate" type="date" />
              </div>
              <div class="date-field">
                <span data-i18n="date.end">结束日期</span>
                <input id="endDate" type="date" />
              </div>
            </div>
            <div class="date-note" data-i18n="date.note">选择开始和结束日期后，自动按“结束日期 - 开始日期”计算天数并填入上方。</div>
          </div>

          <div class="field">
            <label for="rate">
              <span data-i18n="field.rate">年利率</span>
              <span class="hint">Annual Rate %</span>
            </label>
            <input id="rate" type="number" min="0" step="0.0001" data-i18n-placeholder="placeholder.rate" placeholder="例如：2.35" />
          </div>

          <div class="field">
            <label for="interest">
              <span data-i18n="field.interest">利息</span>
              <span class="hint">Interest</span>
            </label>
            <input id="interest" type="number" min="0" step="0.01" data-i18n-placeholder="placeholder.interest" placeholder="例如：225.34" />
          </div>
        </div>

        <div class="base-days">
          <div data-i18n="baseDays.note">年化天数口径：银行常见按 365 天，也有产品按 360 天。你可以根据银行说明切换。</div>
          <select id="baseDays" aria-label="Annual basis days">
            <option value="365" data-i18n="baseDays.365">365 天</option>
            <option value="360" data-i18n="baseDays.360">360 天</option>
          </select>
        </div>

        <div class="actions">
          <button class="primary-btn" id="calculateBtn" data-i18n="button.calculate">开始计算</button>
          <button class="secondary-btn" id="clearBtn" data-i18n="button.clear">清空</button>
        </div>

        <div id="message" class="message"></div>
      </main>

      <aside class="card-side">
        <div class="result">
          <div class="result-item">
            <span data-i18n="result.rate">年利率</span>
            <strong id="resultRate">-</strong>
          </div>
          <div class="result-item">
            <span data-i18n="result.interest">利息</span>
            <strong id="resultInterest">-</strong>
          </div>
          <div class="result-item">
            <span data-i18n="result.total">本息合计</span>
            <strong id="resultTotal">-</strong>
          </div>
        </div>

        <div class="formula" data-i18n="formula">
          计算公式：利息 = 本金 × 年利率 × 存款天数 ÷ 年化天数。<br />例如：本金 100,000，35 天，利息 225.34，年化 365 天，则年利率 ≈ 2.35%。
        </div>

        <div class="example-box">
          <button class="example-btn" data-example="rate" data-i18n="example.rate">示例：本金+期限+利息 → 年利率</button>
          <button class="example-btn" data-example="interest" data-i18n="example.interest">示例：本金+期限+年利率 → 利息</button>
          <button class="example-btn" data-example="term" data-i18n="example.term">示例：本金+利息+年利率 → 期限</button>
        </div>
      </aside>
    </div>
  </div>

  <button class="float-lang" id="langToggle" type="button" aria-label="Switch language">EN</button>

  <script>
    const APP_VERSION = "v1.4.0";
    const LANG_STORAGE_KEY = "depositCalculatorLang";
    const isStandaloneMode = window.navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches;
    if (isStandaloneMode) {
      document.documentElement.classList.add("standalone-mode");
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (registration) {
          registration.update().catch(function () {});
        }).catch(function () {
          // 本地 file:// 打开时会注册失败；部署到 https 后会正常工作。
        });
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      let currentTarget = "rate";
      let currentLang = getInitialLang();

      const i18n = {
        zh: {
          title: "定存计算器",
          pageTitle: "定存计算器",
          htmlLang: "zh-CN",
          mode: {
            rate: "求年利率",
            interest: "算利息",
            principal: "求本金",
            term: "求期限"
          },
          field: {
            principal: "本金",
            term: "存款期限",
            rate: "年利率",
            interest: "利息"
          },
          placeholder: {
            principal: "例如：100000",
            term: "例如：35",
            rate: "例如：2.35",
            interest: "例如：225.34"
          },
          disabledPlaceholder: {
            rate: "自动求年利率",
            interest: "自动算利息",
            principal: "自动求本金",
            term: "自动求期限"
          },
          unit: {
            day: "天",
            month: "月",
            year: "年",
            dayFull: "天",
            monthFull: "个月",
            yearFull: "年"
          },
          date: {
            start: "开始日期",
            end: "结束日期",
            note: "选择开始和结束日期后，自动按“结束日期 - 开始日期”计算天数并填入上方。"
          },
          baseDays: {
            note: "年化天数口径：银行常见按 365 天，也有产品按 360 天。你可以根据银行说明切换。",
            365: "365 天",
            360: "360 天"
          },
          button: {
            calculate: "开始计算",
            clear: "清空"
          },
          result: {
            rate: "年利率",
            interest: "利息",
            total: "合计"
          },
          formula: "计算公式：利息 = 本金 × 年利率 × 存款天数 ÷ 年化天数。<br />例如：本金 100,000，35 天，利息 225.34，年化 365 天，则年利率 ≈ 2.35%。",
          example: {
            rate: "示例：本金+期限+利息 → 年利率",
            interest: "示例：本金+期限+年利率 → 利息",
            term: "示例：本金+利息+年利率 → 期限"
          },
          message: {
            dateError: "结束日期必须晚于开始日期，才能计算有效的存款天数。",
            dateSuccess: function (days) { return "已根据开始日期和结束日期自动填入存款期限：" + days + " 天。"; },
            validatePositive: function (name) { return "请填写有效的" + name + "，必须大于 0。"; },
            termText: function (term) { return "，反推期限为 " + term; },
            calculationSuccess: function (termText) { return "计算完成" + termText + "。结果按单利估算，实际以银行产品规则为准。"; }
          },
          langToggle: "EN"
        },
        en: {
          title: "Deposit Calculator",
          pageTitle: "Deposit Calculator",
          htmlLang: "en",
          mode: {
            rate: "Rate",
            interest: "Interest",
            principal: "Principal",
            term: "Term"
          },
          field: {
            principal: "Principal",
            term: "Term",
            rate: "Annual Rate",
            interest: "Interest"
          },
          placeholder: {
            principal: "e.g. 100000",
            term: "e.g. 35",
            rate: "e.g. 2.35",
            interest: "e.g. 225.34"
          },
          disabledPlaceholder: {
            rate: "Auto rate",
            interest: "Auto interest",
            principal: "Auto principal",
            term: "Auto term"
          },
          unit: {
            day: "Days",
            month: "Months",
            year: "Years",
            dayFull: "days",
            monthFull: "months",
            yearFull: "years"
          },
          date: {
            start: "Start Date",
            end: "End Date",
            note: "Select start and end dates to auto-fill the term as End Date - Start Date."
          },
          baseDays: {
            note: "Annual basis: banks commonly use 365 days, while some products use 360 days. Choose based on the product rules.",
            365: "365 days",
            360: "360 days"
          },
          button: {
            calculate: "Calculate",
            clear: "Clear"
          },
          result: {
            rate: "Annual Rate",
            interest: "Interest",
            total: "Total"
          },
          formula: "Formula: Interest = Principal × Annual Rate × Term Days ÷ Annual Basis Days.<br />Example: Principal 100,000, 35 days, interest 225.34, 365-day basis, annual rate ≈ 2.35%.",
          example: {
            rate: "Example: Principal + Term + Interest → Rate",
            interest: "Example: Principal + Term + Rate → Interest",
            term: "Example: Principal + Interest + Rate → Term"
          },
          message: {
            dateError: "The end date must be later than the start date to calculate a valid term.",
            dateSuccess: function (days) { return "Term auto-filled from the selected dates: " + days + " days."; },
            validatePositive: function (name) { return "Please enter a valid " + name + "; it must be greater than 0."; },
            termText: function (term) { return ", calculated term: " + term; },
            calculationSuccess: function (termText) { return "Calculation completed" + termText + ". Results use simple interest; actual bank rules may vary."; }
          },
          langToggle: "中"
        }
      };

      const $ = function (selector) {
        return document.querySelector(selector);
      };

      const $$ = function (selector) {
        return Array.from(document.querySelectorAll(selector));
      };

      function getInitialLang() {
        const savedLang = localStorage.getItem(LANG_STORAGE_KEY);
        if (savedLang === "zh" || savedLang === "en") return savedLang;
        return "zh";
      }

      function getByPath(path) {
        return path.split(".").reduce(function (source, key) {
          return source && source[key];
        }, i18n[currentLang]);
      }

      function t(path) {
        const value = getByPath(path);
        return value === undefined || value === null ? path : value;
      }

      function applyTranslations() {
        document.documentElement.lang = i18n[currentLang].htmlLang;
        document.title = i18n[currentLang].pageTitle;

        $$('[data-i18n]').forEach(function (element) {
          const value = t(element.dataset.i18n);
          if (element.classList.contains("formula")) {
            element.innerHTML = value;
          } else {
            element.textContent = value;
          }
        });

        $$('[data-i18n-placeholder]').forEach(function (element) {
          element.placeholder = t(element.dataset.i18nPlaceholder);
        });

        $("#langToggle").textContent = i18n[currentLang].langToggle;
        $("#appVersion").textContent = APP_VERSION;
        refreshTargetPlaceholder();
      }

      function numberValue(selector) {
        const element = $(selector);
        const raw = element ? element.value : "";
        if (raw === "" || raw === null || raw === undefined) return null;
        const value = Number(raw);
        return Number.isFinite(value) ? value : null;
      }

      function toDays(term, unit) {
        if (term === null) return null;
        if (unit === "day") return term;
        if (unit === "month") return term * 30;
        if (unit === "year") return term * 365;
        return term;
      }

      function fromDays(days, unit) {
        if (unit === "day") return days;
        if (unit === "month") return days / 30;
        if (unit === "year") return days / 365;
        return days;
      }

      function parseDateInput(value) {
        if (!value) return null;
        const parts = value.split("-").map(Number);
        if (parts.length !== 3 || parts.some(function (part) { return !Number.isFinite(part); })) return null;
        return Date.UTC(parts[0], parts[1] - 1, parts[2]);
      }

      function calculateDaysFromDateRange(options) {
        const startDate = parseDateInput($("#startDate").value);
        const endDate = parseDateInput($("#endDate").value);
        const shouldShowMessage = options && options.showMessage;

        if (startDate === null || endDate === null) return null;

        const oneDay = 24 * 60 * 60 * 1000;
        const days = Math.round((endDate - startDate) / oneDay);

        if (days <= 0) {
          $("#term").value = "";
          if (shouldShowMessage) {
            resetResults();
            showMessage("error", i18n[currentLang].message.dateError);
          }
          return null;
        }

        $("#term").value = days;
        $("#termUnit").value = "day";
        resetResults();
        if (shouldShowMessage) {
          showMessage("success", i18n[currentLang].message.dateSuccess(days));
        }
        return days;
      }

      function formatMoney(value) {
        if (!Number.isFinite(value)) return "-";
        return value.toLocaleString(currentLang === "zh" ? "zh-CN" : "en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function trimTrailingZeros(text) {
        return text.replace(/(\.\d*?[1-9])0+$/, "$1").replace(/\.0+$/, "");
      }

      function formatRate(value) {
        if (!Number.isFinite(value)) return "-";
        return trimTrailingZeros(value.toFixed(4)) + "%";
      }

      function formatTerm(value, unit) {
        if (!Number.isFinite(value)) return "-";
        const unitText = unit === "day" ? i18n[currentLang].unit.dayFull : unit === "month" ? i18n[currentLang].unit.monthFull : i18n[currentLang].unit.yearFull;
        return trimTrailingZeros(value.toFixed(2)) + " " + unitText;
      }

      function showMessage(type, text) {
        const message = $("#message");
        message.classList.remove("error", "success");
        message.classList.add(type);
        message.textContent = text;
        message.hidden = false;
      }

      function clearMessage() {
        const message = $("#message");
        message.classList.remove("error", "success");
        message.textContent = "";
        message.hidden = true;
      }

      function resetResults() {
        $("#resultRate").textContent = "-";
        $("#resultInterest").textContent = "-";
        $("#resultTotal").textContent = "-";
      }

      function refreshTargetPlaceholder() {
        const targetInput = $("#" + currentTarget);
        if (targetInput) {
          targetInput.placeholder = i18n[currentLang].disabledPlaceholder[currentTarget];
        }
      }

      function setTarget(target, options) {
        const shouldClearTarget = !(options && options.keepValue);
        currentTarget = target;
        $$(".mode-btn").forEach(function (button) {
          button.classList.toggle("active", button.dataset.target === target);
        });

        ["#principal", "#term", "#rate", "#interest"].forEach(function (selector) {
          const input = $(selector);
          input.classList.remove("disabled-input");
          input.readOnly = false;
          input.placeholder = t(input.dataset.i18nPlaceholder);
        });

        const targetInput = $("#" + target);
        targetInput.classList.add("disabled-input");
        targetInput.readOnly = true;
        if (shouldClearTarget) targetInput.value = "";
        refreshTargetPlaceholder();
      }

      function validatePositive(nameKey, value) {
        if (value === null || value <= 0) {
          showMessage("error", i18n[currentLang].message.validatePositive(i18n[currentLang].field[nameKey]));
          return false;
        }
        return true;
      }

      function calculate() {
        clearMessage();

        const principal = numberValue("#principal");
        const term = numberValue("#term");
        const ratePercent = numberValue("#rate");
        const interest = numberValue("#interest");
        const termUnit = $("#termUnit").value;
        const baseDays = Number($("#baseDays").value);
        const days = toDays(term, termUnit);

        let resultPrincipal = principal;
        let resultDays = days;
        let resultRatePercent = ratePercent;
        let resultInterest = interest;

        if (currentTarget === "rate") {
          if (!validatePositive("principal", principal)) return;
          if (!validatePositive("term", days)) return;
          if (!validatePositive("interest", interest)) return;
          resultRatePercent = interest / principal / days * baseDays * 100;
        }

        if (currentTarget === "interest") {
          if (!validatePositive("principal", principal)) return;
          if (!validatePositive("term", days)) return;
          if (!validatePositive("rate", ratePercent)) return;
          resultInterest = principal * (ratePercent / 100) * days / baseDays;
        }

        if (currentTarget === "principal") {
          if (!validatePositive("term", days)) return;
          if (!validatePositive("rate", ratePercent)) return;
          if (!validatePositive("interest", interest)) return;
          resultPrincipal = interest / (ratePercent / 100) / days * baseDays;
        }

        if (currentTarget === "term") {
          if (!validatePositive("principal", principal)) return;
          if (!validatePositive("rate", ratePercent)) return;
          if (!validatePositive("interest", interest)) return;
          resultDays = interest / principal / (ratePercent / 100) * baseDays;
          const convertedTerm = fromDays(resultDays, termUnit);
          $("#term").value = Number(convertedTerm.toFixed(4));
        }

        if (currentTarget === "rate") {
          $("#rate").value = Number(resultRatePercent.toFixed(6));
        }
        if (currentTarget === "interest") {
          $("#interest").value = Number(resultInterest.toFixed(2));
        }
        if (currentTarget === "principal") {
          $("#principal").value = Number(resultPrincipal.toFixed(2));
        }

        const total = resultPrincipal + resultInterest;

        $("#resultRate").textContent = formatRate(resultRatePercent);
        $("#resultInterest").textContent = formatMoney(resultInterest);
        $("#resultTotal").textContent = formatMoney(total);

        const termText = currentTarget === "term" ? i18n[currentLang].message.termText(formatTerm(fromDays(resultDays, termUnit), termUnit)) : "";
        showMessage("success", i18n[currentLang].message.calculationSuccess(termText));
      }

      function clearAll() {
        ["#principal", "#term", "#rate", "#interest", "#startDate", "#endDate"].forEach(function (selector) {
          $(selector).value = "";
        });
        resetResults();
        clearMessage();
      }

      $$(".mode-btn").forEach(function (button) {
        button.addEventListener("click", function () {
          setTarget(button.dataset.target);
          resetResults();
          clearMessage();
        });
      });

      $("#calculateBtn").addEventListener("click", calculate);
      $("#clearBtn").addEventListener("click", clearAll);
      $("#langToggle").addEventListener("click", function () {
        currentLang = currentLang === "zh" ? "en" : "zh";
        localStorage.setItem(LANG_STORAGE_KEY, currentLang);
        applyTranslations();
        setTarget(currentTarget, { keepValue: true });
      });

      ["#startDate", "#endDate"].forEach(function (selector) {
        $(selector).addEventListener("change", function () {
          calculateDaysFromDateRange({ showMessage: true });
        });
      });

      $("#term").addEventListener("input", function () {
        resetResults();
        clearMessage();
      });

      $$("input, select").forEach(function (element) {
        element.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            calculate();
          }
        });
      });

      $$(".example-btn").forEach(function (button) {
        button.addEventListener("click", function () {
          const example = button.dataset.example;
          clearAll();

          if (example === "rate") {
            setTarget("rate");
            $("#principal").value = 100000;
            $("#term").value = 35;
            $("#termUnit").value = "day";
            $("#interest").value = 225.34;
          }

          if (example === "interest") {
            setTarget("interest");
            $("#principal").value = 100000;
            $("#term").value = 35;
            $("#termUnit").value = "day";
            $("#rate").value = 2.35;
          }

          if (example === "term") {
            setTarget("term");
            $("#principal").value = 100000;
            $("#rate").value = 2.35;
            $("#interest").value = 225.34;
            $("#termUnit").value = "day";
          }

          calculate();
        });
      });

      applyTranslations();
      setTarget("rate");
      clearMessage();
    });
  </script>
</body>
</html>
