<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>定存计算器</title>
  <!-- iOS / PWA：添加到主屏幕后以独立 App 方式打开，不显示 Safari 地址栏 -->
  <meta name="theme-color" content="#2563eb" />
  <meta name="application-name" content="定存计算器" />
  <meta name="apple-mobile-web-app-title" content="定存计算器" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32%), linear-gradient(135deg, #f4f7fb 0%, #e9eef7 100%);
      color: #1f2937;
      min-height: 100vh;
      min-height: 100dvh;
      padding: calc(12px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: none;
    }

    .standalone-mode body {
      min-height: 100dvh;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(24px, 2.8vw, 34px);
      line-height: 1.16;
      color: #0f172a;
      letter-spacing: -0.04em;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .calculator-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 308px;
      gap: 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 22px;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
      padding: 16px;
      backdrop-filter: blur(12px);
    }

    .card-main,
    .card-side {
      min-width: 0;
    }

    .card-side {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mode-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .mode-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
      padding: 8px 13px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 750;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .mode-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 15px;
      padding: 11px;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: #27364a;
      margin-bottom: 7px;
      font-weight: 750;
    }

    .field .hint {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .date-range {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .date-field {
      min-width: 0;
    }

    .date-field span {
      display: block;
      margin-bottom: 4px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
    }

    .date-field input {
      height: 36px;
      font-size: 13px;
      padding: 0 9px;
    }

    .date-note {
      margin-top: 7px;
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.45;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      padding: 0 11px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    select {
      max-width: 104px;
      flex-shrink: 0;
    }

    .disabled-input {
      background: #eef2ff;
      border-color: #93c5fd;
      color: #1d4ed8;
      font-weight: 750;
    }

    .base-days {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 15px;
      color: #475569;
      font-size: 13px;
      line-height: 1.45;
    }

    .base-days select {
      max-width: 150px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 750;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary-btn {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
      flex: 1;
      min-width: 180px;
    }

    .secondary-btn {
      background: #eef2ff;
      color: #1d4ed8;
      min-width: 110px;
    }

    .result {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .result-item {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      border-radius: 17px;
      padding: 13px 14px;
      min-height: 78px;
    }

    .result-item span {
      display: block;
      color: #cbd5e1;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .result-item strong {
      display: block;
      font-size: 21px;
      line-height: 1.15;
      word-break: break-word;
    }

    .formula {
      color: #64748b;
      font-size: 12px;
      line-height: 1.65;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 15px;
      padding: 11px 12px;
    }

    .message {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 13px;
      display: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .example-box {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .example-btn {
      background: #f1f5f9;
      color: #334155;
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 999px;
      font-weight: 700;
      line-height: 1.2;
    }



    .currency-panel {
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.07), rgba(14, 165, 233, 0.06));
      border: 1px solid rgba(191, 219, 254, 0.9);
    }

    .currency-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
      gap: 10px;
      align-items: center;
    }

    .currency-select-wrap,
    .inline-rate {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .currency-select-wrap > span,
    .inline-rate > span {
      color: #475569;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .currency-select-wrap select {
      max-width: none;
      flex: 1;
      min-width: 0;
    }

    .inline-rate input {
      width: 94px;
      flex: 0 0 94px;
      text-align: right;
      font-weight: 750;
      color: #0f172a;
    }

    .inline-rate input:disabled {
      color: #64748b;
      background: #f1f5f9;
    }

    .rate-settings {
      margin-top: 8px;
    }

    .rate-settings summary {
      cursor: pointer;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
      user-select: none;
    }

    .rate-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .rate-grid label {
      display: grid;
      gap: 4px;
      min-width: 0;
      color: #475569;
      font-size: 11px;
      font-weight: 750;
    }

    .rate-grid input {
      height: 34px;
      border-radius: 11px;
      font-size: 13px;
      padding: 0 8px;
    }

    .rate-hint {
      margin-top: 7px;
      color: #64748b;
      font-size: 11px;
      line-height: 1.45;
    }

    .rate-actions {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .rate-refresh-btn {
      padding: 7px 11px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 12px;
      box-shadow: none;
      min-width: 0;
    }

    .auto-refresh-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #475569;
      font-size: 11px;
      font-weight: 750;
      user-select: none;
      line-height: 1.2;
    }

    .auto-refresh-toggle input {
      width: 15px;
      height: 15px;
      min-width: 15px;
      padding: 0;
      border-radius: 4px;
      accent-color: #2563eb;
    }

    .rate-status {
      margin-top: 7px;
      color: #475569;
      font-size: 11px;
      line-height: 1.45;
    }

    .rate-status.success {
      color: #047857;
    }

    .rate-status.error {
      color: #b91c1c;
    }

    .rate-source-note {
      margin-top: 4px;
      color: #94a3b8;
      font-size: 10px;
      line-height: 1.35;
    }

    .money-main,
    .money-cny {
      display: block;
    }

    .money-cny {
      margin-top: 4px;
      color: #bfdbfe;
      font-size: 12px;
      font-weight: 750;
      line-height: 1.25;
    }

    .cny-compare-card strong {
      font-size: 13px;
      line-height: 1.35;
    }

    .cny-compare-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 3px;
      color: #dbeafe;
      font-size: 12px;
      font-weight: 750;
    }

    .cny-compare-line:first-child {
      margin-top: 0;
    }

    .cny-compare-line .label {
      color: #cbd5e1;
      white-space: nowrap;
    }

    .cny-compare-rate {
      margin-top: 2px;
      color: #93c5fd;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.3;
    }

    .cny-change {
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px solid rgba(203, 213, 225, 0.16);
      font-size: 13px;
      font-weight: 850;
    }

    .cny-change.profit { color: #86efac; }
    .cny-change.loss { color: #fca5a5; }
    .cny-change.flat { color: #cbd5e1; }

    .fx-mini-note {
      margin-top: 4px;
      color: #94a3b8;
      font-size: 10px;
      font-weight: 650;
      line-height: 1.25;
    }

    .term-input-block {
      margin-top: 8px;
    }

    .term-inline-label {
      display: block;
      margin-bottom: 4px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
    }

    .float-lang {
      position: fixed;
      right: calc(18px + env(safe-area-inset-right));
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 20;
      min-width: 54px;
      height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      background: #0f172a;
      color: #fff;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 14px;
    }


    @media (min-width: 901px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        padding: calc(4px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
      }

      .app {
        height: calc(100dvh - 12px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
        max-height: calc(100dvh - 12px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .header {
        flex: 0 0 auto;
        margin-bottom: 4px;
      }

      .title-row {
        gap: 7px;
      }

      .header h1 {
        font-size: clamp(22px, 2.1vw, 28px);
        line-height: 1.05;
      }

      .version-badge {
        height: 20px;
        padding: 0 8px;
        font-size: 11px;
      }

      .calculator-card {
        flex: 1 1 auto;
        min-height: 0;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 12px;
        padding: 12px;
        border-radius: 20px;
        overflow: hidden;
      }

      .card-main,
      .card-side {
        min-height: 0;
        gap: 8px;
      }

      .mode-box {
        gap: 7px;
        margin-bottom: 8px;
      }

      .mode-btn {
        padding: 7px 12px;
        font-size: 13px;
      }

      .currency-panel {
        margin-bottom: 8px;
        padding: 9px 10px;
        border-radius: 14px;
      }

      .currency-main {
        gap: 8px;
      }

      .currency-select-wrap > span,
      .inline-rate > span {
        font-size: 12px;
      }

      input,
      select {
        height: 36px;
        border-radius: 11px;
        padding: 0 10px;
        font-size: 14px;
      }

      .inline-rate input {
        width: 92px;
        flex-basis: 92px;
      }

      .rate-settings {
        margin-top: 6px;
      }

      .rate-settings summary {
        font-size: 12px;
      }

      .rate-grid {
        margin-top: 6px;
        gap: 6px;
      }

      .rate-grid input {
        height: 30px;
        font-size: 12px;
      }

      .rate-hint {
        margin-top: 5px;
        font-size: 10px;
        line-height: 1.28;
      }

      .rate-actions {
        margin-top: 6px;
        gap: 7px;
      }

      .rate-refresh-btn {
        padding: 6px 10px;
        font-size: 12px;
      }

      .auto-refresh-toggle {
        font-size: 10px;
      }

      .rate-status {
        margin-top: 5px;
        font-size: 10px;
        line-height: 1.28;
      }

      .rate-source-note {
        margin-top: 3px;
        font-size: 10px;
        line-height: 1.22;
      }

      .grid {
        gap: 8px;
      }

      .field {
        padding: 9px;
        border-radius: 14px;
      }

      .field label {
        margin-bottom: 5px;
        font-size: 12px;
      }

      .field .hint {
        font-size: 10px;
      }

      .date-range {
        margin-top: 6px;
        gap: 7px;
      }

      .date-field span {
        margin-bottom: 3px;
        font-size: 10px;
      }

      .date-field input {
        height: 32px;
        font-size: 12px;
        padding: 0 8px;
      }

      .term-input-block {
        margin-top: 6px;
      }

      .date-note {
        margin-top: 6px;
        font-size: 10px;
        line-height: 1.28;
      }

      .base-days {
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 14px;
        font-size: 12px;
        line-height: 1.35;
      }

      .base-days select {
        max-width: 140px;
      }

      .actions {
        margin-top: 8px;
        gap: 8px;
      }

      button {
        padding: 9px 14px;
        border-radius: 13px;
        font-size: 13px;
      }

      .primary-btn {
        min-width: 160px;
      }

      .secondary-btn {
        min-width: 100px;
      }

      .message {
        margin-top: 8px;
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.35;
      }

      .result {
        gap: 7px;
      }

      .result-item {
        min-height: 68px;
        padding: 10px 12px;
        border-radius: 15px;
      }

      .result-item span {
        margin-bottom: 5px;
        font-size: 11px;
      }

      .result-item strong {
        font-size: 19px;
      }

      .cny-compare-card {
        min-height: 112px;
      }

      .cny-compare-card strong {
        font-size: 12px;
        line-height: 1.25;
      }

      .cny-compare-line {
        margin-top: 2px;
        font-size: 11px;
      }

      .cny-compare-rate {
        margin-top: 1px;
        font-size: 9px;
        line-height: 1.2;
      }

      .cny-change {
        margin-top: 4px;
        padding-top: 4px;
        font-size: 12px;
      }

      .fx-mini-note {
        margin-top: 3px;
        font-size: 9px;
      }

      .formula {
        padding: 9px 10px;
        border-radius: 14px;
        font-size: 11px;
        line-height: 1.45;
      }

      .example-box {
        gap: 6px;
      }

      .example-btn {
        padding: 7px 9px;
        font-size: 11px;
      }
    }

    @media (min-width: 901px) and (max-height: 820px) {
      .calculator-card {
        padding: 10px;
        gap: 10px;
      }

      .currency-panel {
        padding: 8px 10px;
      }

      .rate-hint,
      .rate-source-note,
      .date-note {
        display: none;
      }

      .field {
        padding: 8px;
      }

      .result-item {
        min-height: 62px;
        padding: 9px 11px;
      }

      .cny-compare-card {
        min-height: 104px;
      }

      .formula {
        font-size: 10px;
        line-height: 1.35;
        padding: 8px 9px;
      }

      .example-btn {
        padding: 6px 8px;
      }
    }

    @media (min-width: 901px) and (max-height: 740px) {
      .example-box {
        display: none;
      }

      .formula {
        display: none;
      }
    }


    @media (min-width: 721px) and (max-height: 760px) {
      body {
        padding-top: calc(8px + env(safe-area-inset-top));
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }

      .header {
        margin-bottom: 8px;
      }

      .header h1 {
        font-size: 26px;
      }

      .calculator-card {
        padding: 14px;
        gap: 12px;
      }

      .field {
        padding: 10px;
      }

      .result-item {
        min-height: 70px;
        padding: 11px 12px;
      }
    }

    @media (max-width: 900px) {
      .calculator-card {
        grid-template-columns: 1fr;
      }

      .card-side {
        display: grid;
        grid-template-columns: 1fr;
      }

      .result {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      body {
        padding: calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(72px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
        overflow-x: hidden;
      }

      .app {
        width: min(430px, 100%);
        min-height: calc(100dvh - 80px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
      }

      .header {
        margin-bottom: 8px;
        flex: 0 0 auto;
      }

      .title-row {
        gap: 7px;
      }

      .header h1 {
        font-size: 23px;
        line-height: 1.12;
        letter-spacing: -0.03em;
      }

      .version-badge {
        height: 20px;
        padding: 0 7px;
        font-size: 10px;

      function getInitialLang() {

        return "zh";

      function getByPath(path) {
        return path.split(".").reduce(function (source, key) {
          return source && source[key];
        }, i18n[currentLang]);

      function t(path) {

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          if (saved && saved.currency && defaultRates[saved.currency] !== undefined) {
            selectedCurrency = saved.currency;
          }
          if (saved && saved.rates && typeof saved.rates === "object") {
            Object.keys(defaultRates).forEach(function (code) {
              const value = Number(saved.rates[code]);
              if (Number.isFinite(value) && value > 0) {
                rates[code] = value;
              }
            });
          }
          if (saved && saved.rateMeta && typeof saved.rateMeta === "object") {
            rateMeta = Object.assign(rateMeta, saved.rateMeta);
          } else if (saved && saved.rateUpdatedAt) {
            rateMeta.updatedAt = saved.rateUpdatedAt;
            rateMeta.source = "manual";
          }
          rateMeta.autoRefresh = saved.autoRefresh === undefined ? rateMeta.autoRefresh : saved.autoRefresh !== false;
          rates.CNY = 1;
        } catch (error) {
          rates = Object.assign({}, defaultRates);
          selectedCurrency = "CNY";
        }
      }

      function saveSettings(metaUpdate) {
        rates.CNY = 1;
        if (metaUpdate && typeof metaUpdate === "object") {
          rateMeta = Object.assign(rateMeta, metaUpdate);
        }
        localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify({
          currency: selectedCurrency,
          rates: rates,
          autoRefresh: rateMeta.autoRefresh !== false,
          rateUpdatedAt: rateMeta.updatedAt || "",
          rateMeta: rateMeta
        }));
      }

      function sourceLabel(source) {
        if (source === "exchange-rate-api") return i18n[currentLang].currency.sourceExchangeRateApi;
        if (source === "frankfurter") return i18n[currentLang].currency.sourceFrankfurter;
        if (source === "exchange-api") return "Exchange API";
        return i18n[currentLang].currency.sourceManual;
      }

      function formatDateTime(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString(currentLang === "zh" ? "zh-CN" : "en-US", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        });
      }

      function setRateStatus(type, text) {
        const status = $("#rateStatus");
        if (!status) return;
        status.classList.remove("success", "error");
        if (type) status.classList.add(type);
        status.textContent = text;
      }

      function renderRateStatus() {
        const source = sourceLabel(rateMeta.source);
        if (rateMeta.lastError) {
          setRateStatus("error", i18n[currentLang].currency.refreshFailed);
          return;
        }
        if (rateMeta.updatedAt) {
          setRateStatus(rateMeta.source === "manual" ? "" : "success", i18n[currentLang].currency.lastUpdated(formatDateTime(rateMeta.updatedAt), source));
        } else {
          setRateStatus("", i18n[currentLang].currency.neverUpdated);
        }
      }

      function shouldAutoRefreshRates() {
        if (rateMeta.autoRefresh === false) return false;
        if (navigator.onLine === false) return false;
        const lastTime = Date.parse(rateMeta.fetchedAt || rateMeta.updatedAt || "");
        if (!Number.isFinite(lastTime)) return true;
        return Date.now() - lastTime > AUTO_REFRESH_INTERVAL_MS;
      }

      function getCurrencySymbol(currency) {
        return {
          CNY: "¥",
          USD: "$",
          TRY: "₺",
          MXN: "MX$"
        }[currency] || "";
      }

      function formatCurrencyAmount(value, currency) {
        if (!Number.isFinite(value)) return "-";
        return getCurrencySymbol(currency) + value.toLocaleString(currentLang === "zh" ? "zh-CN" : "en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function formatFxRate(value) {
        if (!Number.isFinite(value)) return "-";
        return value.toLocaleString(currentLang === "zh" ? "zh-CN" : "en-US", {
          minimumFractionDigits: 6,
          maximumFractionDigits: 6
        });
      }

      function formatFxNumber(value) {
        if (!Number.isFinite(value)) return "-";
        return trimTrailingZeros(value.toFixed(4));
      }

      function convertToCny(value) {
        if (!Number.isFinite(value)) return null;
        const rate = Number(rates[selectedCurrency]);
        if (!Number.isFinite(rate) || rate <= 0) return null;
        return value * rate;
      }

      function formatResultMoneyHtml(value) {
        if (!Number.isFinite(value)) return "-";
        const original = formatCurrencyAmount(value, selectedCurrency);
        if (selectedCurrency === "CNY") {
          return '<span class="money-main">' + original + '</span>';
        }
        const cnyValue = convertToCny(value);
        const approxText = currentLang === "zh" ? "约 " : "≈ ";
        return '<span class="money-main">' + original + '</span><span class="money-cny">' + approxText + formatCurrencyAmount(cnyValue, "CNY") + '</span>';
      }

      function localDateString(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
      }

      function getCurrentCurrencyRateRecord(currency, rateDateText, estimated, hasFallback) {
        return {
          rate: Number(rates[currency]) || 1,
          date: rateDateText || localDateString(new Date()),
          source: currency === "CNY" ? "CNY" : "current",
          estimated: estimated !== false,
          fallback: hasFallback === true
        };
      }

      function addDaysToDateText(dateText, days) {
        const parts = (dateText || "").split("-").map(Number);
        if (parts.length !== 3 || !parts.every(Number.isFinite)) return dateText;
        const date = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
        date.setUTCDate(date.getUTCDate() + days);
        const year = date.getUTCFullYear();
        const month = String(date.getUTCMonth() + 1).padStart(2, "0");
        const day = String(date.getUTCDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
      }

      function parseFrankfurterRates(data) {
        const items = [];
        let apiDate = data && data.date ? data.date : "";
        if (data && Array.isArray(data.rates)) {
          data.rates.forEach(function (item) {
            const rate = Number(item && item.rate);
            if (item && item.quote && Number.isFinite(rate)) {
              items.push({ quote: item.quote, base: item.base || "", rate: rate, date: item.date || apiDate || "" });
              if (!apiDate && item.date) apiDate = item.date;
            }
          });
        } else if (data && data.rates && typeof data.rates === "object") {
          Object.keys(data.rates).forEach(function (code) {
            const rate = Number(data.rates[code]);
            if (Number.isFinite(rate)) {
              items.push({ quote: code, base: data.base || "", rate: rate, date: data.date || apiDate || "" });
            }
          });
        }
        const rateMap = {};
        items.forEach(function (item) {
          rateMap[item.quote] = item.rate;
        });
        return { rates: rateMap, items: items, date: apiDate };
      }

      function fetchHistoricalFromExchangeApi(currency, dateText) {
        const code = currency.toLowerCase();
        const urls = [
          "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@" + encodeURIComponent(dateText) + "/v1/currencies/" + code + ".min.json",
          "https://" + encodeURIComponent(dateText) + ".currency-api.pages.dev/v1/currencies/" + code + ".min.json"
        ];

        function fetchUrl(index) {
          if (index >= urls.length) {
            return Promise.reject(new Error("Exchange API historical rate unavailable"));
          }
          return fetchJsonWithTimeout(urls[index], 9000).then(function (data) {
            const baseData = data && data[code];
            const rate = Number(baseData && baseData.cny);
            if (!Number.isFinite(rate) || rate <= 0) {
              throw new Error("Missing Exchange API CNY rate");
            }
            return {
              rate: rate,
              date: data.date || dateText,
              source: "exchange-api",
              estimated: false,
              fallback: false
            };
          }).catch(function () {
            return fetchUrl(index + 1);
          });
        }

        return fetchUrl(0);
      }

      function fetchHistoricalFromFrankfurter(currency, dateText) {
        const fromText = addDaysToDateText(dateText, -10);
        const url = "https://api.frankfurter.dev/v2/rates?from=" + encodeURIComponent(fromText) + "&to=" + encodeURIComponent(dateText) + "&base=" + encodeURIComponent(currency) + "&quotes=CNY";
        return fetchJsonWithTimeout(url, 9000).then(function (data) {
          const parsed = parseFrankfurterRates(data);
          const candidates = (parsed.items || []).filter(function (item) {
            return item.quote === "CNY" && Number.isFinite(item.rate) && item.rate > 0 && (!item.date || item.date <= dateText);
          }).sort(function (a, b) {
            return String(a.date || "").localeCompare(String(b.date || ""));
          });
          const selected = candidates[candidates.length - 1];
          if (!selected) {
            throw new Error("Missing Frankfurter historical rate");
          }
          return {
            rate: selected.rate,
            date: selected.date || parsed.date || dateText,
            source: "frankfurter",
            estimated: false,
            fallback: false
          };
        });
      }

      function fetchHistoricalCurrencyRateToCny(currency, dateText) {
        if (!dateText || currency === "CNY") {
          return Promise.resolve({ rate: 1, date: dateText || "", source: "CNY", estimated: false, fallback: false });
        }

        const todayText = localDateString(new Date());
        if (dateText > todayText) {
          return Promise.resolve(getCurrentCurrencyRateRecord(currency, todayText, true, false));
        }

        return fetchHistoricalFromExchangeApi(currency, dateText).catch(function () {
          return fetchHistoricalFromFrankfurter(currency, dateText);
        }).catch(function () {
          return getCurrentCurrencyRateRecord(currency, todayText, true, true);
        });
      }

      function buildHistoricalRateLine(selectedDate, rateDate, rate, estimated) {
        const resultText = i18n[currentLang].result;
        let label;
        if (estimated) {
          label = resultText.currentEstimatedRate;
        } else if (rateDate && rateDate !== selectedDate) {
          label = resultText.useRateDate + " " + rateDate + " " + resultText.fxRate;
        } else {
          label = resultText.fxRate;
        }
        return '<div class="cny-compare-rate">' + selectedDate + ' · ' + label + ': 1 ' + selectedCurrency + ' = ' + "¥" + formatFxRate(rate) + '</div>';
      }

      function renderCnyCompareResult(startCny, endCny, meta) {
        const box = $("#resultCnyCompare");
        if (!box) return;
        const change = endCny - startCny;
        const absChange = Math.abs(change);
        const epsilon = 0.005;
        const changeType = change > epsilon ? "profit" : change < -epsilon ? "loss" : "flat";
        const changeLabel = changeType === "profit" ? i18n[currentLang].result.profit : changeType === "loss" ? i18n[currentLang].result.loss : i18n[currentLang].result.flat;
        const startLabel = i18n[currentLang].result.start + (meta.startEstimated ? "(" + i18n[currentLang].result.estimated + ")" : "");
        const endLabel = i18n[currentLang].result.end + (meta.endEstimated ? "(" + i18n[currentLang].result.estimated + ")" : "");
        const startRateLine = buildHistoricalRateLine(meta.startSelectedDate, meta.startRateDate, meta.startRate, meta.startEstimated);
        const endRateLine = buildHistoricalRateLine(meta.endSelectedDate, meta.endRateDate, meta.endRate, meta.endEstimated);
        const note = meta.hasFallback ? '<div class="fx-mini-note">' + i18n[currentLang].result.fxFallback + '</div>' : "";
        box.innerHTML =
          '<div class="cny-compare-line"><span class="label">' + startLabel + '</span><span>' + formatCurrencyAmount(startCny, "CNY") + '</span></div>' +
          startRateLine +
          '<div class="cny-compare-line"><span class="label">' + endLabel + '</span><span>' + formatCurrencyAmount(endCny, "CNY") + '</span></div>' +
          endRateLine +
          '<div class="cny-change ' + changeType + '">' + changeLabel + ' ' + formatCurrencyAmount(absChange, "CNY") + '</div>' +
          note;
      }

      function updateDateCnyComparison(resultPrincipal, resultInterest) {
        const startValue = $("#startDate").value;
        const endValue = $("#endDate").value;
        fxCompareRequestId += 1;
        const requestId = fxCompareRequestId;

        if (!startValue || !endValue || !Number.isFinite(resultPrincipal) || !Number.isFinite(resultInterest)) {
          renderCnyComparePlaceholder();
          return;
        }

        renderCnyCompareLoading();
        Promise.all([
          fetchHistoricalCurrencyRateToCny(selectedCurrency, startValue),
          fetchHistoricalCurrencyRateToCny(selectedCurrency, endValue)
        ]).then(function (records) {
          if (requestId !== fxCompareRequestId) return;
          const startRate = records[0].rate;
          const endRate = records[1].rate;
          const startCny = resultPrincipal * startRate;
          const endCny = (resultPrincipal + resultInterest) * endRate;
          renderCnyCompareResult(startCny, endCny, {
            startEstimated: records[0].estimated,
            endEstimated: records[1].estimated,
            hasFallback: records[0].fallback || records[1].fallback,
            startRate: startRate,
            endRate: endRate,
            startSelectedDate: startValue,
            endSelectedDate: endValue,
            startRateDate: records[0].date || startValue,
            endRateDate: records[1].date || endValue
          });
        });
      }


      function fetchJsonWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(function () {
          controller.abort();
        }, timeoutMs || 8000);

        return fetch(url, {
          cache: "no-store",
          signal: controller.signal
        }).then(function (response) {
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          return response.json();
        }).finally(function () {
          clearTimeout(timer);
        });
      }

      function invertCnyBaseRates(sourceRates) {
        const nextRates = { CNY: 1 };
        ["USD", "TRY", "MXN"].forEach(function (code) {
          const cnyToCurrency = Number(sourceRates[code]);
          if (!Number.isFinite(cnyToCurrency) || cnyToCurrency <= 0) {
            throw new Error("Missing rate: " + code);
          }
          nextRates[code] = 1 / cnyToCurrency;
        });
        return nextRates;
      }

      function fetchFromExchangeRateApi() {
        return fetchJsonWithTimeout("https://open.er-api.com/v6/latest/CNY", 9000).then(function (data) {
          if (!data || data.result !== "success" || !data.rates) {
            throw new Error("Invalid ExchangeRate-API response");
          }
          return {
            source: "exchange-rate-api",
            apiDate: data.time_last_update_utc || data.time_last_update_unix || "",
            rates: invertCnyBaseRates(data.rates)
          };
        });
      }

      function fetchFromFrankfurter() {
        return fetchJsonWithTimeout("https://api.frankfurter.dev/v2/rates?base=CNY&quotes=USD,TRY,MXN", 9000).then(function (data) {
          const parsed = parseFrankfurterRates(data);
          if (!parsed.rates || !parsed.rates.USD || !parsed.rates.TRY || !parsed.rates.MXN) {
            throw new Error("Invalid Frankfurter response");
          }
          return {
            source: "frankfurter",
            apiDate: parsed.date || "",
            rates: invertCnyBaseRates(parsed.rates)
          };
        });
      }

      function fetchLatestRates() {
        return fetchFromExchangeRateApi().catch(function () {
          return fetchFromFrankfurter();
        });
      }

      function setRefreshButtonLoading(isLoading) {
        const button = $("#refreshRatesBtn");
        if (!button) return;
        button.disabled = isLoading;
        button.textContent = isLoading ? i18n[currentLang].currency.refreshing : i18n[currentLang].currency.refresh;
      }

      function refreshRates(options) {
        const isManual = options && options.manual;
        setRefreshButtonLoading(true);
        setRateStatus("", i18n[currentLang].currency.refreshing);

        return fetchLatestRates().then(function (result) {
          rates = Object.assign({}, rates, result.rates, { CNY: 1 });
          const now = new Date().toISOString();
          saveSettings({
            updatedAt: now,
            fetchedAt: now,
            source: result.source,
            apiDate: result.apiDate || "",
            lastError: ""
          });
          renderCurrencyUI();
          resetResults();
          setRateStatus("success", i18n[currentLang].currency.refreshSuccess(sourceLabel(result.source), formatDateTime(now)));
          if (isManual) {
            showMessage("success", i18n[currentLang].currency.refreshSuccess(sourceLabel(result.source), formatDateTime(now)));
          }
        }).catch(function () {
          saveSettings({ lastError: new Date().toISOString() });
          renderRateStatus();
          if (isManual) {
            showMessage("error", i18n[currentLang].currency.refreshFailed);
          }
        }).finally(function () {
          setRefreshButtonLoading(false);
        });
      }

      function renderCurrencyUI() {
        const currencySelect = $("#currencySelect");
        const selectedRate = $("#selectedRate");
        if (!currencySelect || !selectedRate) return;
        rates.CNY = 1;
        currencySelect.value = selectedCurrency;
        $("#inlineRatePrefix").textContent = "1 " + selectedCurrency + " =";
        selectedRate.value = Number(rates[selectedCurrency]).toFixed(selectedCurrency === "CNY" ? 0 : 4).replace(/\.0+$/, "").replace(/(\.\d*?[1-9])0+$/, "$1");
        selectedRate.disabled = selectedCurrency === "CNY";
        $$(".rate-input").forEach(function (input) {
          const code = input.dataset.currency;
          input.value = Number(rates[code]).toFixed(4).replace(/(\.\d*?[1-9])0+$/, "$1").replace(/\.0+$/, "");
        });
        const autoToggle = $("#autoRefreshToggle");
        if (autoToggle) autoToggle.checked = rateMeta.autoRefresh !== false;
        renderRateStatus();
      }

      function updateRate(code, value) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed) || parsed <= 0) {
          showMessage("error", i18n[currentLang].currency.invalidRate);
          return false;
        }
        rates[code] = parsed;
        rates.CNY = 1;
        saveSettings({
          updatedAt: new Date().toISOString(),
          source: "manual",
          apiDate: "",
          lastError: ""
        });
        renderCurrencyUI();
        resetResults();
        return true;
      }

      function applyTranslations() {
        document.documentElement.lang = i18n[currentLang].htmlLang;
        document.title = i18n[currentLang].pageTitle;

        $$('[data-i18n]').forEach(function (element) {
          const value = t(element.dataset.i18n);
          if (element.classList.contains("formula")) {
            element.innerHTML = value;
          } else {
            element.textContent = value;
          }
        });

        $$('[data-i18n-placeholder]').forEach(function (element) {
          element.placeholder = t(element.dataset.i18nPlaceholder);
        });

        $("#langToggle").textContent = i18n[currentLang].langToggle;
        $("#appVersion").textContent = APP_VERSION;
        renderCurrencyUI();
        refreshTargetPlaceholder();
      }

      function numberValue(selector) {
        const element = $(selector);
        const raw = element ? element.value : "";
        if (raw === "" || raw === null || raw === undefined) return null;
        const value = Number(raw);
        return Number.isFinite(value) ? value : null;
      }

      function toDays(term, unit) {
        if (term === null) return null;
        if (unit === "day") return term;
        if (unit === "month") return term * 30;
        if (unit === "year") return term * 365;
        return term;
      }

      function fromDays(days, unit) {
        if (unit === "day") return days;
        if (unit === "month") return days / 30;
        if (unit === "year") return days / 365;
        return days;
      }

      function parseDateInput(value) {
        if (!value) return null;
        const parts = value.split("-").map(Number);
        if (parts.length !== 3 || parts.some(function (part) { return !Number.isFinite(part); })) return null;
        return Date.UTC(parts[0], parts[1] - 1, parts[2]);
      }

      function calculateDaysFromDateRange(options) {
        const startDate = parseDateInput($("#startDate").value);
        const endDate = parseDateInput($("#endDate").value);
        const shouldShowMessage = options && options.showMessage;

        if (startDate === null || endDate === null) return null;

        const oneDay = 24 * 60 * 60 * 1000;
        const days = Math.round((endDate - startDate) / oneDay);

        if (days <= 0) {
          $("#term").value = "";
          if (shouldShowMessage) {
            resetResults();
            showMessage("error", i18n[currentLang].message.dateError);
          }
          return null;
        }

        $("#term").value = days;
        $("#termUnit").value = "day";
        resetResults();
        if (shouldShowMessage) {
          showMessage("success", i18n[currentLang].message.dateSuccess(days));
        }
        return days;
      }

      function formatMoney(value) {
        if (!Number.isFinite(value)) return "-";
        return value.toLocaleString(currentLang === "zh" ? "zh-CN" : "en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function trimTrailingZeros(text) {
        return text.replace(/(\.\d*?[1-9])0+$/, "$1").replace(/\.0+$/, "");
      }

      function formatRate(value) {
        if (!Number.isFinite(value)) return "-";
        return trimTrailingZeros(value.toFixed(4)) + "%";
      }

      function formatTerm(value, unit) {
        if (!Number.isFinite(value)) return "-";
        const unitText = unit === "day" ? i18n[currentLang].unit.dayFull : unit === "month" ? i18n[currentLang].unit.monthFull : i18n[currentLang].unit.yearFull;
        return trimTrailingZeros(value.toFixed(2)) + " " + unitText;
      }

      function showMessage(type, text) {
        const message = $("#message");
        message.classList.remove("error", "success");
        message.classList.add(type);
        message.textContent = text;
        message.hidden = false;
      }

      function clearMessage() {
        const message = $("#message");
        message.classList.remove("error", "success");
        message.textContent = "";
        message.hidden = true;
      }

      function resetResults() {
        fxCompareRequestId += 1;
        $("#resultRate").textContent = "-";
        $("#resultInterest").textContent = "-";
        $("#resultTotal").textContent = "-";
        renderCnyComparePlaceholder();
      }

      function hasCalculationOutput() {
        return ["#resultRate", "#resultInterest", "#resultTotal", "#resultCnyCompare"].some(function (selector) {
          const element = $(selector);
          if (!element) return false;
          const text = (element.textContent || "").trim();
          return text !== "" && text !== "-" && text !== i18n[currentLang].result.loadingFx;
        });
      }

      function refreshTargetPlaceholder() {
        const targetInput = $("#" + currentTarget);
        if (targetInput) {
          targetInput.placeholder = i18n[currentLang].disabledPlaceholder[currentTarget];
        }
      }

      function setTarget(target, options) {
        const shouldClearTarget = !(options && options.keepValue);
        currentTarget = target;
        $$(".mode-btn").forEach(function (button) {
          button.classList.toggle("active", button.dataset.target === target);
        });

        ["#principal", "#term", "#rate", "#interest"].forEach(function (selector) {
          const input = $(selector);
          input.classList.remove("disabled-input");
          input.readOnly = false;
          input.placeholder = t(input.dataset.i18nPlaceholder);
        });

        const targetInput = $("#" + target);
        targetInput.classList.add("disabled-input");
        targetInput.readOnly = true;
        if (shouldClearTarget) targetInput.value = "";
        refreshTargetPlaceholder();
      }

      function validatePositive(nameKey, value) {
        if (value === null || value <= 0) {
          showMessage("error", i18n[currentLang].message.validatePositive(i18n[currentLang].field[nameKey]));
          return false;
        }
        return true;
      }

      function calculate() {
        clearMessage();

        const principal = numberValue("#principal");
        const term = numberValue("#term");
        const ratePercent = numberValue("#rate");
        const interest = numberValue("#interest");
        const termUnit = $("#termUnit").value;
        const baseDays = Number($("#baseDays").value);
        const days = toDays(term, termUnit);
        if (selectedCurrency !== "CNY") {
          const inlineRate = Number($("#selectedRate").value);
          if (Number.isFinite(inlineRate) && inlineRate > 0) {
            rates[selectedCurrency] = inlineRate;
            saveSettings({
              updatedAt: new Date().toISOString(),
              source: "manual",
              apiDate: "",
              lastError: ""
            });
            renderRateStatus();
          }
        }
        if (!Number.isFinite(Number(rates[selectedCurrency])) || Number(rates[selectedCurrency]) <= 0) {
          showMessage("error", i18n[currentLang].currency.invalidRate);
          return;
        }

        let resultPrincipal = principal;
        let resultDays = days;
        let resultRatePercent = ratePercent;
        let resultInterest = interest;

        if (currentTarget === "rate") {
          if (!validatePositive("principal", principal)) return;
          if (!validatePositive("term", days)) return;
          if (!validatePositive("interest", interest)) return;
          resultRatePercent = interest / principal / days * baseDays * 100;
        }

        if (currentTarget === "interest") {
          if (!validatePositive("principal", principal)) return;
          if (!validatePositive("term", days)) return;
          if (!validatePositive("rate", ratePercent)) return;
          resultInterest = principal * (ratePercent / 100) * days / baseDays;
        }

        if (currentTarget === "principal") {
          if (!validatePositive("term", days)) return;
          if (!validatePositive("rate", ratePercent)) return;
          if (!validatePositive("interest", interest)) return;
          resultPrincipal = interest / (ratePercent / 100) / days * baseDays;
        }

        if (currentTarget === "term") {
          if (!validatePositive("principal", principal)) return;
          if (!validatePositive("rate", ratePercent)) return;
          if (!validatePositive("interest", interest)) return;
          resultDays = interest / principal / (ratePercent / 100) * baseDays;
          const convertedTerm = fromDays(resultDays, termUnit);
          $("#term").value = Number(convertedTerm.toFixed(4));
        }

        if (currentTarget === "rate") {
          $("#rate").value = Number(resultRatePercent.toFixed(6));
        }
        if (currentTarget === "interest") {
          $("#interest").value = Number(resultInterest.toFixed(2));
        }
        if (currentTarget === "principal") {
          $("#principal").value = Number(resultPrincipal.toFixed(2));
        }

        const total = resultPrincipal + resultInterest;

        $("#resultRate").textContent = formatRate(resultRatePercent);
        $("#resultInterest").innerHTML = formatResultMoneyHtml(resultInterest);
        $("#resultTotal").innerHTML = formatResultMoneyHtml(total);
        updateDateCnyComparison(resultPrincipal, resultInterest);

        const termText = currentTarget === "term" ? i18n[currentLang].message.termText(formatTerm(fromDays(resultDays, termUnit), termUnit)) : "";
        showMessage("success", i18n[currentLang].message.calculationSuccess(termText));
      }

      function clearAll() {
        ["#principal", "#term", "#rate", "#interest", "#startDate", "#endDate"].forEach(function (selector) {
          $(selector).value = "";
        });
        resetResults();
        clearMessage();
      }

      $("#currencySelect").addEventListener("change", function () {
        selectedCurrency = this.value;
        saveSettings();
        renderCurrencyUI();
        resetResults();
        clearMessage();
      });

      $("#selectedRate").addEventListener("change", function () {
        if (selectedCurrency === "CNY") return;
        updateRate(selectedCurrency, this.value);
      });

      $$(".rate-input").forEach(function (input) {
        input.addEventListener("change", function () {
          updateRate(input.dataset.currency, input.value);
        });
      });

      $("#refreshRatesBtn").addEventListener("click", function () {
        refreshRates({ manual: true });
      });

      $("#autoRefreshToggle").addEventListener("change", function () {
        rateMeta.autoRefresh = this.checked;
        saveSettings({ autoRefresh: this.checked, lastError: "" });
        renderRateStatus();
        if (this.checked && shouldAutoRefreshRates()) {
          refreshRates({ manual: false });
        }
      });

      $$(".mode-btn").forEach(function (button) {
        button.addEventListener("click", function () {
          setTarget(button.dataset.target);
          resetResults();
          clearMessage();
        });
      });

      $("#calculateBtn").addEventListener("click", calculate);
      $("#clearBtn").addEventListener("click", clearAll);
      $("#langToggle").addEventListener("click", function () {
        const shouldRecalculate = hasCalculationOutput();
        currentLang = currentLang === "zh" ? "en" : "zh";
        localStorage.setItem(LANG_STORAGE_KEY, currentLang);
        applyTranslations();
        setTarget(currentTarget, { keepValue: true });
        if (shouldRecalculate) {
          calculate();
        } else {
          clearMessage();
        }
      });

      ["#startDate", "#endDate"].forEach(function (selector) {
        $(selector).addEventListener("change", function () {
          calculateDaysFromDateRange({ showMessage: true });
        });
      });

      $("#term").addEventListener("input", function () {
        resetResults();
        clearMessage();
      });

      $$("input, select").forEach(function (element) {
        element.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            calculate();
          }
        });
      });

      $$(".example-btn").forEach(function (button) {
        button.addEventListener("click", function () {
          const example = button.dataset.example;
          clearAll();

          if (example === "rate") {
            setTarget("rate");
            $("#principal").value = 100000;
            $("#term").value = 35;
            $("#termUnit").value = "day";
            $("#interest").value = 225.34;
          }

          if (example === "interest") {
            setTarget("interest");
            $("#principal").value = 100000;
            $("#term").value = 35;
            $("#termUnit").value = "day";
            $("#rate").value = 2.35;
          }

          if (example === "term") {
            setTarget("term");
            $("#principal").value = 100000;
            $("#rate").value = 2.35;
            $("#interest").value = 225.34;
            $("#termUnit").value = "day";
          }

          calculate();
        });
      });

      loadSettings();
      applyTranslations();
      setTarget("rate");
      clearMessage();
      if (shouldAutoRefreshRates()) {
        refreshRates({ manual: false });
      }
    });
  </script>
</body>
</html>
